user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # WebSocket upgrade mapping
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # --- HTTP: redirect to HTTPS (except ACME challenge for Let's Encrypt) ---
    server {
        listen 80;
        server_name SEU_DOMINIO.com;

        # Let's Encrypt validation
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS: dashboard (app) ---
    server {
        listen 443 ssl http2;
        server_name SEU_DOMINIO.com;

        ssl_certificate     /etc/letsencrypt/live/SEU_DOMINIO.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Basic Auth (usuario/senha)
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/htpasswd;

        # VNC web UI (noVNC) em /vnc/
        location /vnc/ {
            proxy_pass http://app:6080/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Dashboard + API + WebSocket
        location / {
            proxy_pass http://app:8001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
