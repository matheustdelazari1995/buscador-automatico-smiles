version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./profiles:/app/profiles
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    shm_size: '2gb'  # Chrome precisa de shared memory

